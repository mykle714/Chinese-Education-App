    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- maximum-scale=1 + user-scalable=no disable double-tap / pinch zoom on
         Android/Chrome/Firefox. iOS Safari IGNORES user-scalable=no, so page-level
         pinch on iOS is blocked separately in JS via the useBlockZoom hook. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Inter: primary Latin UI font. Noto Sans/Serif SC: CJK glyphs + hero character.
         These back the FONTS.* stacks in src/theme/fonts.ts. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  </head>
